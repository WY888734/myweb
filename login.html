<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <style>
        /* ========================================================================= */
        /* 核心：隐藏式导航栏样式（保留隐藏功能，优化位置和美观度） */
        /* ========================================================================= */
        /* 隐藏式导航按钮：固定在页面右上角，不占用主要布局空间 */
        .menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #161B22; /* 与登录卡片同色 */
            color: #58A6FF; /* 主题蓝文字 */
            border: 1px solid #30363D;
            border-radius: 6px;
            padding: 10px 16px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            z-index: 999; /* 确保在最上层 */
            transition: all 0.3s;
        }

        /* 按钮悬浮效果 */
        .menu-btn:hover {
            background-color: #21262D;
            border-color: #58A6FF;
            box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
        }

        /* 隐藏式菜单：默认隐藏，展开后悬浮在右上角 */
        .hidden-menu {
            position: fixed;
            top: 70px; /* 位于按钮下方 */
            right: 20px;
            list-style: none;
            padding: 0;
            margin: 0;
            background-color: #161B22; /* 菜单背景色 */
            border: 1px solid #30363D;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            width: 180px; /* 固定菜单宽度 */
            display: none; /* 核心：默认隐藏 */
            z-index: 998;
        }

        /* 菜单项样式 */
        .hidden-menu li {
            padding: 12px 20px;
            border-bottom: 1px solid #30363D;
            transition: background-color 0.2s;
        }

        .hidden-menu li:last-child {
            border-bottom: none;
        }

        /* 菜单项悬浮效果 */
        .hidden-menu li:hover {
            background-color: #21262D;
        }

        /* 导航链接样式 */
        .hidden-menu li a {
            color: #C9D1D9;
            text-decoration: none;
            display: block; /* 整个菜单项可点击 */
            width: 100%;
            height: 100%;
        }

        .hidden-menu li:hover a {
            color: #58A6FF; /* 悬浮变主题蓝 */
        }

        /* 菜单展开时显示（通过JS控制） */
        .hidden-menu.show {
            display: block;
        }

        /* ========================================================================= */
        /* 原有样式：仅调整登录卡片位置，避免被菜单按钮遮挡 */
        /* ========================================================================= */
        body {
            background-color: #0D1117;
            color: #C9D1D9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; /* 给页面边缘留空间 */
            box-sizing: border-box;
        }

        .login-card {
            background-color: #161B22;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
            border: 1px solid #30363D;
        }

        .login-card h1 {
            color: #58A6FF;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        label {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        .label-text {
            width: 80px;
            text-align: right;
            margin-right: 20px;
            color: #8B949E;
        }

        input[type="text"],
        input[type="password"] {
            flex: 1;
            padding: 12px 15px;
            background-color: #0D1117;
            border: 1px solid #30363D;
            border-radius: 6px;
            color: #C9D1D9;
            font-size: 1rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            border-color: #58A6FF;
            outline: none;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3);
        }

        .button-group {
            text-align: center;
            margin-top: 30px;
        }

        input[type="submit"] {
            width: 100%;
            padding: 12px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
            background-color: #238636;
            color: white;
        }

        input[type="submit"]:hover {
            background-color: #2EA043;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <!-- 隐藏式导航栏核心结构 -->
    <!-- 菜单按钮：点击触发显示/隐藏 -->
    <button class="menu-btn" onclick="toggleHiddenMenu()">☰ 菜单</button>
    <!-- 隐藏菜单：默认隐藏，通过JS添加show类显示 -->
    <ul class="hidden-menu" id="hiddenMenu">
        <li><a href="/index3.html">主页</a></li>
        <li><a href="/directory.html">装机步骤</a></li>
        <li><a href="/index3.html#gallery">装机作品</a></li>
        <li><a href="/index.html">旧版入口</a></li>
    </ul>

    <!-- 隐藏式导航栏切换逻辑（核心：保留隐藏功能） -->
    <script>
        function toggleHiddenMenu() {
            const menu = document.getElementById('hiddenMenu');
            // 核心逻辑：添加/移除show类，控制菜单显示/隐藏
            menu.classList.toggle('show');
        }

        // 可选优化：点击页面其他区域关闭菜单（增强体验）
        document.addEventListener('click', function(e) {
            const menuBtn = document.querySelector('.menu-btn');
            const menu = document.getElementById('hiddenMenu');
            // 点击的不是按钮也不是菜单，且菜单处于显示状态 → 关闭菜单
            if (!menuBtn.contains(e.target) && !menu.contains(e.target) && menu.classList.contains('show')) {
                menu.classList.remove('show');
            }
        });
    </script>

    <!-- 登录表单-->
    <form action="" class="login-card">
        <h1>用户登录</h1>
        
        <label>
            <span class="label-text">用户名：</span>
            <input type="text" name="username" required>
        </label>

        <label>
            <span class="label-text">密码：</span>
            <input type="password" name="password" required>
        </label>
        
        <div class="button-group">
            <input type="submit" value="登录">
        </div>
    </form>
</body>
</html>
