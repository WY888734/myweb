<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>累计装机量 - 数据可视化</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 全局样式（贴合小白装机深色主题） */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: #0D1117;
            color: #C9D1D9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 数据卡片容器 */
        .stats-card {
            background-color: #161B22;
            border: 1px solid #30363D;
            border-radius: 12px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
        }

        /* 标题样式 */
        .stats-title {
            font-size: 1.2rem;
            color: #8B949E;
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* 数字滚动容器 */
        .counter-wrapper {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        /* 滚动数字样式 */
        #counter {
            font-size: 4rem;
            font-weight: 700;
            color: #58A6FF; /* 主题蓝，与logo呼应 */
            line-height: 1.2;
        }

        /* 单位样式 */
        .counter-unit {
            font-size: 1.5rem;
            color: #C9D1D9;
            font-weight: 500;
        }

        /* 备注文字 */
        .stats-note {
            font-size: 0.9rem;
            color: #6E7681;
            margin-top: 10px;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .stats-card {
                padding: 30px 40px;
            }

            #counter {
                font-size: 3rem;
            }

            .counter-unit {
                font-size: 1.2rem;
            }

            .stats-title {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            #counter {
                font-size: 2.5rem;
            }

            .counter-unit {
                font-size: 1rem;
            }

            .stats-card {
                padding: 25px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="stats-card">
        <div class="stats-title">累计成功装机</div>
        <div class="counter-wrapper">
            <div id="counter" data-target="5862">0</div> <!-- data-target 为最终目标值 -->
            <span class="counter-unit">台</span>
        </div>
        <div class="stats-note">数据实时更新 · 基于全国用户反馈</div>
    </div>

    <script>
        // 数字滚动核心逻辑
        const counter = document.getElementById('counter');
        const target = +counter.getAttribute('data-target'); // 获取目标值（5862）
        let count = 0;

        // 计算步长（分母越大，滚动越慢；分母越小，滚动越快）
        const step = target / 250; // 250步完成滚动，速度适中

        const updateCount = () => {
            // 累计计数（最后一步直接跳到目标值，避免小数取整误差）
            if (count + step >= target) {
                count = target;
            } else {
                count += step;
            }
                
            // 更新显示（取整，避免小数）
            counter.innerText = Math.floor(count);

            // 未达到目标时，继续调用（浏览器重绘同步，动画平滑）
            if (count < target) {
                requestAnimationFrame(updateCount);
            }
        };

        // 页面加载完成后开始动画（避免DOM未渲染导致的问题）
        document.addEventListener('DOMContentLoaded', updateCount);
    </script>
</body>
</html>
